name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Grant minimum permissions at workflow level; jobs override as needed
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.9"

jobs:
  # ─────────────────────────────────────────────
  # 1. Quality & Security Checks
  # ─────────────────────────────────────────────
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install tools
        run: pip install flake8 black isort bandit safety

      - name: Check formatting (black)
        run: black --check --diff .

      - name: Check import order (isort)
        run: isort --check-only --diff .

      - name: Lint with flake8
        run: flake8 . --config=.flake8

      - name: Run bandit (SAST)
        run: bandit -r . --exclude ./venv,./tests -ll

      - name: Run safety (CVE check)
        run: safety check --file requirements.txt --ignore 70612

  # ─────────────────────────────────────────────
  # 2. Tests with PostgreSQL service container
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [quality]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crud_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crud_db_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}


  # ─────────────────────────────────────────────
  # 3. Docker Build & Push to Docker Hub
  # ─────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/crud-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image pushed successfully
        run: |
          echo "✅ Docker image pushed to Docker Hub:"
          echo "   ${{ secrets.DOCKERHUB_USERNAME }}/crud-api:latest"
          echo "   ${{ secrets.DOCKERHUB_USERNAME }}/crud-api:sha-${{ github.sha }}"

  # ─────────────────────────────────────────────
  # 4. Trivy Container Image Vulnerability Scan
  # ─────────────────────────────────────────────
  trivy:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      security-events: write  # needed to upload SARIF to GitHub Code Scanning

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull the image to scan
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/crud-api:latest

      # ── Table scan (human-readable, fails build on CRITICAL/HIGH) ──
      - name: Trivy scan — Table (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/crud-api:latest"
          format: "table"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"          # set to "1" to hard-fail on vulnerabilities

      # ── SARIF scan → GitHub Security tab (best-effort, never fails build) ──
      - name: Trivy scan — SARIF output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/crud-api:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true   # never fail pipeline if Code Scanning is disabled
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-container"

      # ── Always archive the SARIF as a downloadable artifact ──
      - name: Archive Trivy SARIF report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
          retention-days: 30
