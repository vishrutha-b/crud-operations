# Required metadata
sonar.projectKey=vishrutha-b_crud-operations
sonar.organization=vishrutha-b
sonar.projectName=CRUD API
sonar.projectVersion=1.0

# Comma-separated paths to directories with sources (required)
sonar.sources=.

# Exclude specific directories from analysis
sonar.exclusions=venv/**,tests/**,**/*.md,**/*.txt,Dockerfile,Jenkinsfile,**/*.yml,**/*.ini

# Path to coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml
